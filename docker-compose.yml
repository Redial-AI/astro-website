services:
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    expose:
      - "1337"
    volumes:
      - cms-data:/opt/app/.tmp
      - cms-uploads:/opt/app/public/uploads
    restart: unless-stopped

  astro-web:
    build:
      context: ./astro-web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      STRAPI_INTERNAL_URL: http://cms:1337
      PUBLIC_STRAPI_URL: ${PUBLIC_STRAPI_URL:-http://localhost}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    expose:
      - "4321"
    depends_on:
      - cms
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - astro-web
      - cms
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  cms-data:
  cms-uploads:
